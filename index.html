<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Gerenciador de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f14;
      --surface:  #141720;
      --border:   #252a38;
      --accent:   #6ee7b7;
      --danger:   #f87171;
      --warn:     #fbbf24;
      --muted:    #4b5563;
      --text:     #e5e7eb;
      --text-dim: #9ca3af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Header ── */
    header {
      max-width: 860px;
      margin: 0 auto 2.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
    }
    header span {
      font-family: 'DM Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Layout ── */
    .container { max-width: 860px; margin: 0 auto; display: grid; gap: 1.5rem; }

    /* ── Card base ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .card h2 {
      font-size: .7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    /* ── Form ── */
    .form-row { display: grid; gap: .75rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group label {
      font-size: .7rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: .1em;
      color: var(--muted);
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: .6rem .8rem;
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 64px; }
    .form-group select option { background: var(--surface); }

    .form-cols { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      padding: .6rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: .85rem;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn:hover { opacity: .85; }
    .btn-primary  { background: var(--accent);  color: #0d0f14; }
    .btn-sm       { padding: .35rem .75rem; font-size: .78rem; }
    .btn-success  { background: #065f46; color: var(--accent); border: 1px solid #047857; }
    .btn-danger   { background: #450a0a; color: var(--danger);  border: 1px solid #7f1d1d; }

    /* ── Search bar ── */
    .search-bar {
      display: flex;
      gap: .5rem;
    }
    .search-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: .55rem .8rem;
      font-family: 'Syne', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1.2rem;
      font-size: .85rem;
      font-family: 'DM Mono', monospace;
      box-shadow: 0 8px 32px #0008;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
      max-width: 280px;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { border-color: var(--accent); color: var(--accent); }
    #toast.err { border-color: var(--danger); color: var(--danger); }

    /* ── Task list ── */
    #lista-tarefas { display: flex; flex-direction: column; gap: .65rem; }

    .task-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .9rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: .75rem;
      align-items: start;
      transition: border-color .2s;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .task-item:hover { border-color: #334155; }
    .task-item.done { opacity: .5; }

    .priority-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .p-Alta   { background: var(--danger); }
    .p-Média  { background: var(--warn); }
    .p-Baixa  { background: var(--accent); }

    .task-title {
      font-weight: 700;
      font-size: .95rem;
      line-height: 1.3;
    }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }
    .task-desc {
      font-size: .78rem;
      color: var(--text-dim);
      margin-top: .2rem;
      font-family: 'DM Mono', monospace;
    }
    .task-meta {
      display: flex;
      gap: .5rem;
      margin-top: .35rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .b-Alta  { color: var(--danger);  border-color: #7f1d1d; background: #450a0a; }
    .b-Média { color: var(--warn);   border-color: #78350f; background: #451a03; }
    .b-Baixa { color: var(--accent); border-color: #065f46; background: #022c22; }
    .b-done  { color: var(--muted);  border-color: var(--border); }

    .task-actions { display: flex; gap: .4rem; flex-shrink: 0; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
    }

    @media (max-width: 520px) {
      .form-cols { grid-template-columns: 1fr; }
      header h1  { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>TaskFlow</h1>
  <span>QA Demo v1.0</span>
</header>

<div class="container">

  <!-- Formulário -->
  <div class="card">
    <h2>// Nova Tarefa</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Título *</label>
        <input type="text" id="titulo" placeholder="Ex: Implementar login"/>
      </div>
      <div class="form-cols">
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="descricao" placeholder="Opcional..."></textarea>
        </div>
        <div class="form-group">
          <label>Prioridade</label>
          <select id="prioridade">
            <option value="Alta">🔴 Alta</option>
            <option value="Média" selected>🟡 Média</option>
            <option value="Baixa">🟢 Baixa</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="criarTarefa()">+ Adicionar Tarefa</button>
    </div>
  </div>

  <!-- Busca -->
  <div class="card">
    <h2>// Buscar</h2>
    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar por título..."/>
      <button class="btn btn-primary" onclick="buscarTarefas()">Buscar</button>
      <button class="btn" style="background:var(--border);color:var(--text)" onclick="carregarTarefas()">Limpar</button>
    </div>
  </div>

  <!-- Lista -->
  <div class="card">
    <h2>// Tarefas</h2>
    <div id="lista-tarefas">
      <div class="empty-state">Nenhuma tarefa cadastrada ainda.</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const API = "http://localhost:5000";

function toast(msg, tipo = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `show ${tipo}`;
  setTimeout(() => el.className = "", 2800);
}

async function criarTarefa() {
  const titulo    = document.getElementById("titulo").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const prioridade = document.getElementById("prioridade").value;

  if (!titulo) { toast("Título é obrigatório!", "err"); return; }

  try {
    const res = await fetch(`${API}/tarefas`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ titulo, descricao, prioridade })
    });
    const data = await res.json();
    if (!res.ok) { toast(data.erro, "err"); return; }

    document.getElementById("titulo").value = "";
    document.getElementById("descricao").value = "";
    document.getElementById("prioridade").value = "Média";
    toast("Tarefa criada com sucesso!", "ok");
    carregarTarefas();
  } catch(e) {
    toast("Erro ao conectar com a API", "err");
  }
}

async function carregarTarefas() {
  try {
    const res = await fetch(`${API}/tarefas`);
    const data = await res.json();
    renderizar(data);
  } catch(e) {
    toast("Erro ao carregar tarefas", "err");
  }
}

async function buscarTarefas() {
  const busca = document.getElementById("busca").value.trim();
  try {
    const res = await fetch(`${API}/tarefas?busca=${encodeURIComponent(busca)}`);
    const data = await res.json();
    renderizar(data);
  } catch(e) {
    toast("Erro na busca", "err");
  }
}

async function concluirTarefa(id) {
  try {
    const res = await fetch(`${API}/tarefas/${id}/concluir`, { method: "PUT" });
    if (res.ok) { toast("Tarefa concluída ✓", "ok"); carregarTarefas(); }
  } catch(e) { toast("Erro ao concluir", "err"); }
}

async function excluirTarefa(id) {
  if (!confirm("Excluir esta tarefa?")) return;
  try {
    const res = await fetch(`${API}/tarefas/${id}`, { method: "DELETE" });
    if (res.ok) { toast("Tarefa excluída", "ok"); carregarTarefas(); }
  } catch(e) { toast("Erro ao excluir", "err"); }
}

function renderizar(tarefas) {
  const container = document.getElementById("lista-tarefas");
  if (!tarefas.length) {
    container.innerHTML = '<div class="empty-state">Nenhuma tarefa encontrada.</div>';
    return;
  }
  container.innerHTML = tarefas.map(t => `
    <div class="task-item ${t.concluida ? 'done' : ''}">
      <div class="priority-dot p-${t.prioridade}"></div>
      <div>
        <div class="task-title">${escHtml(t.titulo)}</div>
        ${t.descricao ? `<div class="task-desc">${escHtml(t.descricao)}</div>` : ''}
        <div class="task-meta">
          <span class="badge b-${t.prioridade}">${t.prioridade}</span>
          <span class="badge b-done">#${t.id}</span>
          ${t.concluida ? '<span class="badge" style="color:var(--accent);border-color:#065f46;background:#022c22">✓ Concluída</span>' : ''}
        </div>
      </div>
      <div class="task-actions">
        ${!t.concluida ? `<button class="btn btn-success btn-sm" onclick="concluirTarefa('${t.id}')">✓</button>` : ''}
        <button class="btn btn-danger btn-sm" onclick="excluirTarefa('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

carregarTarefas();
</script>
</body>
</html>
